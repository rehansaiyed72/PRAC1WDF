<!DOCTYPE html>
<html>
<head>
    <title>Student login</title>
</head>
<body>

    <h2>Student login</h2>

    <form>

        <p>
            Name:
            <input type="text" name="name">
        </p>

        <p>
            Address:<br>
            <textarea name="address" rows="4" cols="30"></textarea>
        </p>

        <p>
            Gender:<br>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </p>

        <p>
            Hobbies:<br>
            <input type="checkbox" name="reading"> Reading<br>
            <input type="checkbox" name="music"> Music<br>
            <input type="checkbox" name="sports"> Sports
        </p>

        <p>
            Course:
            <select name="course">
                <option>BCA</option>
                <option>B.Tech</option>
                <option>B.Sc</option>
                <option>B.Com</option>
            </select>
        </p>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
